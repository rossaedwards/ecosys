# ─── MemOS Overlay ──────────────────────────────────────────────
# docker run -p 9090:9090 memos/memos:latest
memos:
  enabled: false                             # flip to true when Docker is running
  api_url: "http://localhost:9090"
  cube_id: aurphyx_main                      # per-project isolation cube
  decay:
    enabled: true
    half_life_days: 30
  reinforcement:
    enabled: true

# ─── LLM Hooks ──────────────────────────────────────────────────
hooks:
  gemini:
    enabled: true
    auto_save: true
    default_project: memoree-v3
  perplexity:
    enabled: true
    auto_save: true
    default_project: memoree-v3
  supergrok:
    enabled: false                           # Phase 2 WS bridge
    ws_url: ""
  lmstudio:
    enabled: true
    base_url: "http://localhost:1234/v1"
    models:
      nemotron-3-nano-4b:
        alias: nemotron
        default_project: god-mode-core
      qwen-3.5-4b:
        alias: qwen
        default_project: god-mode-core

# ─── Rich Metadata Defaults ─────────────────────────────────────
metadata_defaults:
  priority: 5                                # 1-10
  mood: neutral                              # neutral | focused | inspired | debug
  confidence: 0.8                            # 0.0 - 1.0
  source: api                                # api | hook | manual | ws

# ─── Sync Layer ─────────────────────────────────────────────────
sync:
  backend: pocketbase                        # options: pocketbase | powersync | none
  pocketbase:
    enabled: true
    url: "http://localhost:8090"             # single binary, runs alongside daemon
    collection: memoree_events
  powersync:
    supabase_url: ""
    supabase_anon_key: ""
    sync_on_wifi_only: true
    queue_path: "D:/aurphyx/memoree/sync_queue.db"

# ─── FastAPI + WebSocket Daemon ──────────────────────────────────
server:
  host: 127.0.0.1
  port: 8765
  reload: true
  ws_path: /ws/memory
