# Memoree v3 — Sovereign Memory Substrate
# Date: 2026-04-03
# Cleaned + configured for LM Studio + Qdrant + your exact paths

memoree:
  version: "3.1.0"
  data_root: "C:/rossaedwards/main/memoree"
  project: memoree-v3

# ─── Vector Store ───────────────────────────────────────────────
vector_backend: qdrant

qdrant:
  host: localhost
  port: 6333
  collection: memoree_events
  storage_path: "C:/rossaedwards/main/memoree/qdrant"
  embed_dim: 384
  hybrid:
    enabled: true
    sparse_model: bm25

# ─── SQLite Ledger ──────────────────────────────────────────────
sqlite:
  path: "C:/rossaedwards/main/memoree/ledger.db"
  wal_mode: true

# ─── Embedder — LM Studio (exactly what you asked for) ───────────
embedder:
  backend: lmstudio
  model: all-MiniLM-L6-v2
  lmstudio_url: "http://localhost:1234/v1/embeddings"

# ─── LLM Hooks ──────────────────────────────────────────────────
hooks:
  gemini:
    enabled: true
    auto_save: true
    default_project: memoree-v3
  perplexity:
    enabled: true
    auto_save: true
    default_project: memoree-v3
  lmstudio:
    enabled: true
    base_url: "http://localhost:1234/v1"
    models:
      nemotron-3-nano-4b:
        alias: nemotron
        default_project: god-mode-core
      qwen-3.5-4b:
        alias: qwen
        default_project: god-mode-core
  supergrok:
    enabled: false

# ─── MemOS Overlay (optional) ───────────────────────────────────
memos:
  enabled: false
  api_url: "http://localhost:9090"
  cube_id: aurphyx_main

# ─── Rich Metadata Defaults ─────────────────────────────────────
metadata_defaults:
  priority: 5
  mood: neutral
  confidence: 0.8
  source: api

# ─── Sync Layer ─────────────────────────────────────────────────
sync:
  backend: pocketbase
  pocketbase:
    enabled: true
    url: "http://localhost:8090"
    collection: memoree_events

# ─── FastAPI + WebSocket Daemon ──────────────────────────────────
server:
  host: 127.0.0.1
  port: 7042
  reload: true
  ws_path: /ws/memory
