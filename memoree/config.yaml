# Memoree v3 — master config
# Edit paths for your Windows D: drive setup

memore:
  version: 3
  data_root: "D:/aurphyx/memoree"          # change to C:/... if no D: drive

# --- Vector store ---
vector_backend: lancedb                      # options: lancedb | qdrant
lancedb:
  path: "D:/aurphyx/embeddings"             # LanceDB disk path (columnar files)
  table_name: memoree_events
  embed_dim: 384                             # all-MiniLM-L6-v2 default
qdrant:
  host: localhost
  port: 6333
  collection: memoree_events

# --- SQLite ledger ---
sqlite:
  path: "D:/aurphyx/memoree/ledger.db"      # raw event store + FTS5
  wal_mode: true

# --- Embedder ---
embedder:
  backend: sentence_transformers             # options: sentence_transformers | lmstudio
  model: all-MiniLM-L6-v2
  lmstudio_url: "http://localhost:1234/v1/embeddings"   # fallback if backend=lmstudio

# --- LLM hooks ---
hooks:
  gemini:
    enabled: true
    auto_save: true
  perplexity:
    enabled: true
    auto_save: true
  supergrok:
    enabled: false                           # stub — enable when WS bridge ready
    ws_url: ""
  lmstudio:
    enabled: true
    base_url: "http://localhost:1234/v1"
    models:
      - nemotron-3-nano-4b
      - qwen-3.5-4b

# --- Sync layer ---
sync:
  backend: powersync                        # options: powersync | pocketbase | none
  powersync:
    supabase_url: ""                        # your Supabase project URL
    supabase_anon_key: ""                   # anon key — free tier ~500MB
    sync_on_wifi_only: true
    queue_path: "D:/aurphyx/memoree/sync_queue.db"
  pocketbase:
    url: "http://localhost:8090"
    enabled: false

# --- MemOS overlay (optional Docker) ---
memos:
  enabled: false
  api_url: "http://localhost:9090"
  cube_id: aurphyx_main

# --- FastAPI daemon ---
server:
  host: 127.0.0.1
  port: 8765
  reload: true
