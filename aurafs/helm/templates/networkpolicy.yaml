{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "aurafs.fullname" . }}-policy
  namespace: {{ include "aurafs.namespace" . }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "aurafs.name" . }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: {{ .Values.api.service.grpcPort }}
        - protocol: TCP
          port: {{ .Values.api.service.httpPort }}
        - protocol: TCP
          port: 9090
  egress:
    - to:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: {{ .Values.api.service.grpcPort }}
        - protocol: TCP
          port: {{ .Values.api.service.httpPort }}
        - protocol: TCP
          port: 9090
{{- end }}
