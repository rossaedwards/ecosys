apiVersion: v1
kind: Service
metadata:
  name: {{ include "aurafs.fullname" . }}-shards
  namespace: {{ include "aurafs.namespace" . }}
  labels:
    app.kubernetes.io/name: {{ include "aurafs.name" . }}
    app.kubernetes.io/component: shard
spec:
  clusterIP: None
  ports:
    - name: grpc
      port: {{ .Values.api.service.grpcPort }}
      targetPort: grpc
    - name: metrics
      port: 9090
      targetPort: metrics
  selector:
    app.kubernetes.io/name: {{ include "aurafs.name" . }}
    app.kubernetes.io/component: shard
