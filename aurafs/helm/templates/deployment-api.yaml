apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aurafs.fullname" . }}-api
  namespace: {{ include "aurafs.namespace" . }}
  labels:
    app.kubernetes.io/name: {{ include "aurafs.name" . }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "aurafs.name" . }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "aurafs.name" . }}
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: {{ include "aurafs.fullname" . }}-api
      containers:
        - name: aurafs-api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: grpc
              containerPort: {{ .Values.api.service.grpcPort }}
            - name: http
              containerPort: {{ .Values.api.service.httpPort }}
          env:
            - name: AURAFS_NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: AURAFS_ENV
              value: "{{ .Values.api.env.AURAFS_ENV }}"
          envFrom:
            - configMapRef:
                name: {{ include "aurafs.fullname" . }}-config
          resources:
            requests:
              cpu: {{ .Values.api.resources.requests.cpu }}
              memory: {{ .Values.api.resources.requests.memory }}
            limits:
              cpu: {{ .Values.api.resources.limits.cpu }}
              memory: {{ .Values.api.resources.limits.memory }}
