{{- if and .Values.monitoring.enabled .Values.monitoring.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "aurafs.fullname" . }}-metrics
  namespace: {{ include "aurafs.namespace" . }}
  labels:
    app.kubernetes.io/name: {{ include "aurafs.name" . }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "aurafs.name" . }}
      app.kubernetes.io/component: shard
  namespaceSelector:
    matchNames:
      - {{ include "aurafs.namespace" . }}
  endpoints:
    - port: metrics
      interval: {{ .Values.monitoring.serviceMonitor.interval }}
{{- end }}
