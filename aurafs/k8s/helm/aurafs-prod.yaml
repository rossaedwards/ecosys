# ═══════════════════════════════════════════════════════════════════
# AURAFS PRODUCTION - Full 3-Node Shard Cluster
# Aurphyx LLC | Quantum-Resistant Fractal Mesh Storage
# Deploy: kubectl apply -f aurafs-prod.yaml (or use scripts/deployk8s.sh)
# ═══════════════════════════════════════════════════════════════════

apiVersion: v1
kind: Namespace
metadata:
  name: aurphyx
  labels:
    app.kubernetes.io/name: aurafs
    app.kubernetes.io/part-of: aurphyx

---
# ConfigMap: AuraFS shard server & mesh config
apiVersion: v1
kind: ConfigMap
metadata:
  name: aurafs-config
  namespace: aurphyx
data:
  shard_size_mb: "64"
  erasure_k: "10"
  erasure_m: "4"
  mesh_mode: "data-slayer"
  pqc_kyber: "true"
  pqc_dilithium: "true"

---
# Secret: TLS & PQC keys (placeholders - use sealed-secrets or Vault in prod)
apiVersion: v1
kind: Secret
metadata:
  name: aurafs-tls
  namespace: aurphyx
type: Opaque
stringData:
  # Replace with real certs in production
  tls.crt: ""
  tls.key: ""

---
# Service: AuraFS API (gRPC + REST)
apiVersion: v1
kind: Service
metadata:
  name: aurafs-api
  namespace: aurphyx
  labels:
    app: aurafs-api
spec:
  type: ClusterIP
  ports:
    - name: grpc
      port: 50051
      targetPort: 50051
      protocol: TCP
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
  selector:
    app: aurafs-api

---
# Deployment: AuraFS API (3 replicas)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aurafs-api
  namespace: aurphyx
  labels:
    app: aurafs-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: aurafs-api
  template:
    metadata:
      labels:
        app: aurafs-api
    spec:
      serviceAccountName: aurafs-api
      containers:
        - name: aurafs-api
          image: aurphyx/aurafs-api:v25.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 50051
              name: grpc
            - containerPort: 8080
              name: http
          env:
            - name: AURAFS_NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: AURAFS_SHARD_PEERS
              value: "aurafs-shard-0.aurafs-shards:50051,aurafs-shard-1.aurafs-shards:50051,aurafs-shard-2.aurafs-shards:50051"
          envFrom:
            - configMapRef:
                name: aurafs-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: aurafs-api
                topologyKey: kubernetes.io/hostname

---
# Service: Headless for Shard StatefulSet
apiVersion: v1
kind: Service
metadata:
  name: aurafs-shards
  namespace: aurphyx
  labels:
    app: aurafs-shard
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: grpc
      port: 50051
      targetPort: 50051
    - name: mesh
      port: 9090
      targetPort: 9090
  selector:
    app: aurafs-shard

---
# StatefulSet: 3-Node Shard Cluster (Node 0, 1, 2)
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: aurafs-shard
  namespace: aurphyx
  labels:
    app: aurafs-shard
spec:
  serviceName: aurafs-shards
  replicas: 3
  selector:
    matchLabels:
      app: aurafs-shard
  template:
    metadata:
      labels:
        app: aurafs-shard
    spec:
      serviceAccountName: aurafs-shard
      containers:
        - name: shard-server
          image: aurphyx/aurafs-shard-server:v25.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 50051
              name: grpc
            - containerPort: 9090
              name: metrics
          env:
            - name: AURAFS_SHARD_INDEX
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: AURAFS_DATA_DIR
              value: /data/shards
            - name: AURAFS_REPLICAS
              value: "3"
          envFrom:
            - configMapRef:
                name: aurafs-config
          volumeMounts:
            - name: shard-data
              mountPath: /data/shards
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          livenessProbe:
            tcpSocket:
              port: 50051
            initialDelaySeconds: 30
            periodSeconds: 20
          readinessProbe:
            tcpSocket:
              port: 50051
            initialDelaySeconds: 10
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: shard-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 50Gi

---
# ServiceAccount: API
apiVersion: v1
kind: ServiceAccount
metadata:
  name: aurafs-api
  namespace: aurphyx

---
# ServiceAccount: Shard nodes
apiVersion: v1
kind: ServiceAccount
metadata:
  name: aurafs-shard
  namespace: aurphyx

---
# Service: Prometheus (scrape AuraFS metrics)
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: aurphyx
  labels:
    app: prometheus
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 9090
      targetPort: 9090
  selector:
    app: prometheus

---
# Deployment: Prometheus (shard metrics)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: aurphyx
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.45.0
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --web.enable-lifecycle
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          emptyDir: {}

---
# ConfigMap: Prometheus scrape config (AuraFS shard metrics)
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: aurphyx
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    scrape_configs:
      - job_name: 'aurafs-shards'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [aurphyx]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: aurafs-shard
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: ${1}:9090
      - job_name: 'aurafs-api'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [aurphyx]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: aurafs-api
